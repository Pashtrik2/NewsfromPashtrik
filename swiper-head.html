<!-- Swiper.js CSS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
<style>
.swiper {
  width: 100%;
  margin: 0;
  padding-bottom: 40px;
}

.swiper-slide {
  height: auto;
  display: flex;
  flex-direction: column;
  gap: 14px;
  padding: 18px;
  border-radius: 24px;
  background: #ffffff;
  border: 1px solid #d7e2ec;
  box-shadow: 0 10px 28px rgba(15, 23, 42, 0.06);
}

.swiper-slide img {
  width: 100%;
  height: 240px;
  object-fit: cover;
  border-radius: 18px;
}

.swiper-slide h3 {
  margin: 0;
  font-size: 1.2rem;
  line-height: 1.25;
}

.swiper-slide p {
  margin: 0;
  color: #5f6f86;
}

.swiper-pagination-bullet-active {
  background: #0f766e;
}

.swiper-button-next,
.swiper-button-prev {
  color: #0f766e;
}

@media (max-width: 640px) {
  .swiper-slide {
    padding: 14px;
  }

  .swiper-slide img {
    height: 210px;
  }
}
</style>
<!-- Swiper.js JS -->
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
  new Swiper('.swiper', {
    loop: true,
    pagination: { el: '.swiper-pagination', clickable: true },
    navigation: { nextEl: '.swiper-button-next', prevEl: '.swiper-button-prev' },
    slidesPerView: 1,
    spaceBetween: 20,
    breakpoints: {
      700: { slidesPerView: 2 },
      1000: { slidesPerView: 3 }
    }
  });
});
</script>
